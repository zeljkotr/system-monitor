name: Build Binaries

on:
  push:
    branches:
      - main

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Instaliraj Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Instaliraj zavisnosti
        run: |
          pip install pyinstaller flask psutil
      
      - name: Napravi Linux binary
        run: |
          pyinstaller --onefile --name system-monitor-linux app.py
      
      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: system-monitor-linux
          path: dist/system-monitor-linux

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Instaliraj Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Instaliraj zavisnosti
        run: |
          pip install pyinstaller flask psutil
      
      - name: Napravi Windows binary
        run: |
          pyinstaller --onefile --name system-monitor-windows app.py
      
      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: system-monitor-windows
          path: dist/system-monitor-windows.exe
